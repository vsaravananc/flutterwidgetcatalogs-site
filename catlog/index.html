<!DOCTYPE html>
<html>
  <head>
    <base href="/"/>
    <meta charset="utf-8"/>
    <style>
      @import url(https://unpkg.com/lucide-static@latest/font/lucide.css);
      @import url(https://fonts.googleapis.com/css?family=Roboto);
      *,*::before,*::after {
        box-sizing: border-box;
      }
      h1 {
        margin: unset;
        font-size: 4rem;
      }
    </style>
    <!--$-->
    <title>manual</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!--/-->
    <script src="main.client.dart.js" defer></script>
    <style>
      @import url(https://fonts.googleapis.com/css?family=Roboto);
      @import url(https://unpkg.com/lucide-static@latest/font/lucide.css);
      *,*::before,*::after {
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        min-height: 100vh;
        padding: 0;
        margin: 0;
        cursor: default;
        color: #333333;
        background-color: #F5F5F5;
        scroll-behavior: smooth;
      }
      .container {
        display: flex;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .max1100 {
        max-width: 1100px;
        margin-left: auto;
        margin-right: auto;
      }
      .main {
        display: flex;
        height: 100vh;
        flex-direction: column;
        flex-wrap: wrap;
      }
      .main section {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        flex-grow: 1;
      }
      .custom_button {
        display: flex;
        height: 40px;
        padding-left: 12px;
        padding-right: 12px;
        border: none;
        border-radius: 0.5em;
        box-shadow: 10px 10px #333333;
        transition: all 350ms;
        align-items: center;
        column-gap: 8px;
        color: #F5F5F5;
        font-family: 'Roboto';
        font-weight: 500;
        background-color: #01589B;
      }
      .custom_button:hover {
        box-shadow: 5px 5px #666666;
        cursor: pointer;
        background-color: #1089E6;
      }
      .custom_button:active {
        box-shadow: 2px 2px 4px 1px #666666;
        cursor: pointer;
        color: #000000;
        font-weight: 600;
        background-color: #1089E6;
      }
      .nav_root {
        position: sticky;
        top: 0px;
        z-index: 100;
        width: 100%;
        height: 60px;
        border-bottom-style: solid;
        border-bottom-color: #666666;
        border-bottom-width: 0.5px;
        backdrop-filter: blur(5px);
      }
      .nav_bas {
        display: flex;
        height: 100%;
        padding-left: 0.5em;
        padding-right: 0.5em;
        justify-content: space-between;
      }
      .logo {
        display: flex;
        margin: 0;
        align-items: center;
        font-family: 'Roboto';
        font-weight: 900;
      }
      .search_button_base {
        display: flex;
        width: 35%;
        align-items: center;
      }
      .search_button {
        display: flex;
        width: 100%;
        height: 35px;
        padding-left: 8px;
        padding-right: 8px;
        margin: 0;
        border: solid #666666 1.2px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 350ms;
        align-items: center;
        column-gap: 8px;
        color: #666666;
      }
      .search_button:hover {
        border: solid #01589B 1.5px;
        color: #333333;
      }
      .welocome_screen_root {
        display: flex;
        width: 100%;
        justify-content: center;
        row-gap: 20px;
        background-image: url(/images/box.svg);
        background-repeat: repeat;
        background-size: 300px 300px;
        height: 100vh;
        min-height: calc(100vh - 300.0px);
      }
      .container {
        row-gap: 25px;
      }
      .welcome_button {
        margin-top: 25px;
      }
      .title_holder_card {
        display: flex;
        width: 100%;
        padding: 2em 2em;
        margin-top: 1em;
        margin-bottom: 1em;
        border-radius: 8px;
        align-items: center;
        justify-items: center;
        background-color: #E9ECEF;
      }
      .title_holder {
        margin: unset;
        font-family: 'Roboto';
        font-size: 2.5rem;
        font-weight: 500;
      }
      .lesson_holder_area {
        display: grid;
        padding-left: 4em;
        padding-right: 4em;
        grid-template-columns: auto auto auto;
        gap: 15px;
      }
      .lesson_holder_area div {
        display: flex;
        height: 23em;
        padding: 8px;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <!--@app-->
    <div class="main">
      <div>
        <div class="nav_root">
          <div class="nav_bas max1100">
            <h3 class="logo">Flutter Catalog</h3>
            <div class="search_button_base"><button class="search_button"><i class="icon-search" style="font-size: 1.2em"></i>Search...</button></div>
          </div>
        </div>
        <div>
          <div class="base_of_content max1100">
            <div class="title_holder_card"><h2 class="title_holder">Basic Widgets</h2></div>
            <div class="lesson_holder_area"><div>1</div><div>2</div><div>3</div><div>4</div></div>
          </div>
          <div style="width: 100%; height: 100vh; background-color: #666666"></div>
        </div>
      </div>
    </div>
    <!--/@app-->
  </body>
</html>
